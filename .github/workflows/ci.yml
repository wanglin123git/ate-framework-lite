name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ate-framework-lite.sln

      - name: Build
        run: dotnet build ate-framework-lite.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ate-framework-lite.sln --configuration Release --no-build --verbosity normal

      - name: Run demo (smoke)
        run: dotnet run --project AteFramework.Lite.csproj --configuration Release --no-build -- profiles/lna_plan.csv --no-pause
